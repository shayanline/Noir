name: Branch previews

# Builds a web preview for every branch and publishes it on the gh-pages branch:
#   master           -> site root             (https://<owner>.github.io/Inkfall/)
#   any other branch -> /branches/<slug>/     (slug = branch, slashes to dashes)
# Deleting a branch removes its folder. Non master branches always live under
# branches/, so a branch can never write over the root, the dashboard or
# master's files. Branch names are validated before any write (see ghpages.sh).
#
# The live dashboard is a generated page at /_dashboard/ on gh-pages, rebuilt
# from the deployed folders and the open pull requests on every change. The
# README links to it, so the preview index never commits to a source branch.
#
# A push runs two jobs: build exports the web build and uploads it as an
# artifact, then publish deploys that artifact to gh-pages. Splitting them means
# a failed publish can be re-run without exporting again, and the Godot binary
# and export templates are cached, so a warm run skips the slow download.
#
# Status: a push first marks the branch "building", then "deployed" once publish
# succeeds, or "failed" if either job does not. The dashboard refreshes itself.
#
# Concurrency and safety:
#   - build and publish share a per branch concurrency group, so different
#     branches run in parallel and never cancel each other, while a newer push
#     to the same branch cancels its own stale build or publish (no stale
#     deploy). Pushing many branches at once cannot drop a preview.
#   - All gh-pages writes go through tools/ci/ghpages.sh, which touches only the
#     branch's own folder and re-clones and replays on a rejected push, so
#     parallel deploys converge without losing a folder or a row.
#
# Loop prevention: every gh-pages commit carries [skip ci], and the push trigger
# ignores gh-pages, so a deploy never retriggers the workflow.

on:
  push:
    branches:
      - '**'
      - '!gh-pages'
  delete:
  pull_request:
    types: [opened, reopened, closed]

env:
  GODOT_VERSION: "4.7"

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-24.04
    concurrency:
      group: preview-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      base: ${{ steps.meta.outputs.base }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@v4

      - name: Validate branch name
        id: validate
        run: bash tools/ci/ghpages.sh check "${GITHUB_REF_NAME}" na na

      - name: Compute base URL
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "base=https://${owner}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Mark building
        run: bash tools/ci/ghpages.sh building "${GITHUB_REF_NAME}" "${{ steps.meta.outputs.sha }}" "${{ steps.meta.outputs.base }}"

      - name: Cache Godot and export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Install Godot and export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          wget -q --tries=3 --retry-connrefused "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q --tries=3 --retry-connrefused "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          chmod +x ~/godot-bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Put Godot on PATH
        run: |
          echo "$HOME/godot-bin" >> "$GITHUB_PATH"
          mkdir -p ~/.config/godot

      - name: Import project (build .godot cache)
        run: godot --headless --import

      - name: Export for web
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web
          retention-days: 2

      - name: Mark failed
        # Only after a valid name passed the gate, so an invalid name writes nothing.
        if: failure() && steps.validate.outcome == 'success'
        run: bash tools/ci/ghpages.sh failed "${GITHUB_REF_NAME}" "${{ steps.meta.outputs.sha }}" "${{ steps.meta.outputs.base }}"

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Same group as build: a newer push cancels a stale publish too.
    concurrency:
      group: preview-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web
          path: build/web

      - name: Mark deployed
        run: bash tools/ci/ghpages.sh deployed "${GITHUB_REF_NAME}" "${{ needs.build.outputs.sha }}" "${{ needs.build.outputs.base }}"

      - name: Mark failed
        # Build succeeded (the name is valid), so a failure here is the publish.
        if: failure()
        run: bash tools/ci/ghpages.sh failed "${GITHUB_REF_NAME}" "${{ needs.build.outputs.sha }}" "${{ needs.build.outputs.base }}"

  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Remove preview folder for deleted branch
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          base="https://${owner}.github.io/${{ github.event.repository.name }}/"
          bash tools/ci/ghpages.sh remove "${{ github.event.ref }}" removed "$base"

  pr_refresh:
    # Refresh the dashboard PR links when a same repo pull request opens,
    # reopens or closes. No build, just a re-render.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Re-render dashboard
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          base="https://${owner}.github.io/${{ github.event.repository.name }}/"
          bash tools/ci/ghpages.sh refresh "${{ github.event.pull_request.head.ref }}" "${{ github.event.pull_request.head.sha }}" "$base"
